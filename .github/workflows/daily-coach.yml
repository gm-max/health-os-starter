name: Daily Health OS coach

# Texts you your daily read, with no server of your own.
# Setup (5 min) is in going-further/README.md. You need three repo secrets:
#   ANTHROPIC_API_KEY, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

on:
  # The daily schedule is OFF by default, so a fresh fork doesn't fail every
  # morning before you've added your secrets. Once your 3 secrets are set
  # (see going-further/README.md), uncomment the two lines below to turn on the
  # daily text. GitHub cron is always UTC: "0 7 * * *" is 07:00 UTC. Adjust for
  # your zone (e.g. 06:00 Paris winter -> "0 5 * * *").
  # schedule:
  #   - cron: "0 7 * * *"
  workflow_dispatch: {}   # run it by hand from the Actions tab anytime

jobs:
  coach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send today's read
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional: pin a model you have access to, or change the daily question.
          MODEL: ${{ vars.MODEL }}
        run: python going-further/coach.py
